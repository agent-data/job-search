name: ci
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install test dependencies
        run: python3 -m pip install pytest
      - name: Unit tests
        run: python3 -m pytest -q
      - name: Philosophy guard
        run: python3 scripts/philosophy_guard.py --root .
      - name: Doc lint (knowledge base)
        run: python3 scripts/doc_lint.py --root .
      - name: Structural validation (adapters + manifests)
        run: python3 scripts/validate_platforms.py --root .
      - name: Release integrity
        run: |
          python3 scripts/check_release_integrity.py --root . --check-version-sync
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/check_release_integrity.py --root . --check-version-bump --base "${{ github.event.pull_request.base.sha }}"
          fi
      - name: Build is a no-op (bundled copies in sync)
        run: |
          ./scripts/build.sh
          test -z "$(git status --porcelain skills shared/references/build-stamp.md)" \
            || { echo "build.sh changed bundled skill copies or shared/references/build-stamp.md — commit the re-sync"; git --no-pager diff --stat skills shared/references/build-stamp.md; exit 1; }
